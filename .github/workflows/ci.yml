name: CI

on:
  push:
    branches: [main, feature/*, fix/*]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: uniblack
          POSTGRES_PASSWORD: uniblack
          POSTGRES_DB: uniblack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: backend/go.mod

      - name: Build backend
        run: |
          cd backend
          go build ./...

      - name: Verify database migrations
        env:
          DATABASE_URL: postgres://uniblack:uniblack@localhost:5432/uniblack_test?sslmode=disable
        run: |
          cd backend
          go test ./internal/db -run TestRunMigrations -count=1

      - name: Run backend tests
        env:
          DATABASE_URL: postgres://uniblack:uniblack@localhost:5432/uniblack_test?sslmode=disable
        run: |
          cd backend
          go test ./...

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Run frontend lint
        run: |
          cd frontend
          npm run lint

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: backend/go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run frontend lint
        run: |
          cd frontend
          npm ci
          npm run lint
